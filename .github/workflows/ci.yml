name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Check build size
        run: |
          SIZE=$(stat --format=%s main.js)
          echo "main.js size: $SIZE bytes ($(( SIZE / 1024 / 1024 )) MB)"
          if [ "$SIZE" -gt 3145728 ]; then
            echo "::error::main.js exceeds 3 MB ($SIZE bytes)"
            exit 1
          fi
